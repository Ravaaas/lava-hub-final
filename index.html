<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LAVA — Hub Cuisine</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --rouge:#B5433C; --rouge-dk:#8C302A; --rouge-lt:#C0504A;
  --rose:#F9F0F0; --rose-mid:#EDD8D8; --rose-deep:#E2C5C5;
  --creme:#FDFAF8; --blanc:#FFFFFF;
  --gc:#F4EEEC; --gt:#7A6A6A; --noir:#1E1212;
  --border:#E8D8D8;
  --r:12px;
  --sh-sm:0 2px 8px rgba(34,24,24,.06);
  --sh-md:0 8px 32px rgba(34,24,24,.10);
  --sh-lg:0 20px 60px rgba(34,24,24,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;background:var(--creme);color:var(--noir);min-height:100vh;-webkit-font-smoothing:antialiased}

/* LOGIN */
#login-screen{display:flex;min-height:100vh;background:var(--creme)}
.l-left{width:42%;background:var(--rouge);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;position:relative;overflow:hidden}
.l-left::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,.08) 0%,transparent 70%)}
.l-brand{position:relative;text-align:center}
.l-logo{font-size:4.5rem;font-weight:700;letter-spacing:0.25em;color:#fff;line-height:1;margin-bottom:0.5rem}
.l-sub{font-size:0.62rem;letter-spacing:0.5em;color:rgba(255,255,255,.65);text-transform:uppercase;font-weight:400}
.l-deco{width:40px;height:2px;background:rgba(255,255,255,.35);margin:1.5rem auto 0;border-radius:2px}
.l-right{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem}
.lbox{width:100%;max-width:340px}
.lbox-title{font-size:0.72rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--gt);margin-bottom:1.75rem}
.pb-wrap{display:flex;flex-direction:column;gap:0.6rem}
.pb{padding:1rem 1.25rem;border:2px solid var(--border);background:var(--blanc);border-radius:var(--r);cursor:pointer;font-family:'Poppins',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--noir);transition:all .2s;text-align:left;display:flex;align-items:center;justify-content:space-between}
.pb:hover{border-color:var(--rouge);color:var(--rouge);background:var(--rose);transform:translateX(4px)}
.pb.admin{background:var(--rouge);color:#fff;border-color:var(--rouge);box-shadow:0 4px 16px rgba(181,67,60,.35)}
.pb.admin:hover{background:var(--rouge-dk);border-color:var(--rouge-dk);transform:translateX(4px)}
.pb:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.pb-arrow{font-size:1rem;opacity:.6}
.pw-field{display:none;flex-direction:column;gap:0.6rem;margin-top:0.75rem}
.pw-field input{padding:0.85rem 1rem;border:2px solid var(--border);border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.85rem;background:var(--blanc);color:var(--noir);outline:none;width:100%;transition:all .2s}
.pw-field input:focus{border-color:var(--rouge);box-shadow:0 0 0 3px rgba(181,67,60,.1)}
.btn-confirm{padding:0.9rem;background:var(--rouge);color:#fff;border:none;border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(181,67,60,.3)}
.btn-confirm:hover{background:var(--rouge-dk);transform:translateY(-1px)}
.btn-confirm:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.l-err{color:var(--rouge);font-size:0.72rem;margin-top:0.25rem;display:none;font-weight:500}
@media(max-width:640px){#login-screen{flex-direction:column}.l-left{width:100%;padding:2.5rem 2rem;min-height:220px}.l-logo{font-size:3rem}.l-right{padding:2rem 1.5rem}}

/* APP SHELL */
#app{display:none;flex-direction:column;min-height:100vh}
header{background:var(--blanc);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm)}
.h-left{display:flex;align-items:center;gap:0.6rem}
.h-logo{font-size:1rem;font-weight:700;letter-spacing:0.35em;color:var(--rouge)}
.h-sep{width:1px;height:18px;background:var(--border);margin:0 0.2rem}
.h-right{display:flex;align-items:center;gap:0.75rem}
.sync-pill{display:flex;align-items:center;gap:0.4rem;font-size:0.6rem;font-weight:500;color:var(--gt);background:var(--gc);padding:0.3rem 0.75rem;border-radius:20px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;flex-shrink:0}
.sync-dot.syncing{background:var(--rouge);animation:pulse 1s infinite}
.prof-badge{font-size:0.6rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:0.3rem 0.85rem;border-radius:20px;background:var(--rose);color:var(--rouge);border:1px solid var(--rose-mid)}
.btn-out{font-size:0.62rem;font-weight:500;color:var(--gt);background:none;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;font-family:'Poppins',sans-serif;padding:0.3rem 0.7rem;transition:all .15s}
.btn-out:hover{color:var(--rouge);border-color:var(--rouge)}

/* TABS */
nav.tabs{background:var(--blanc);border-bottom:1px solid var(--border);display:flex;padding:0 1.5rem;overflow-x:auto;scrollbar-width:none}
nav.tabs::-webkit-scrollbar{display:none}
.tb{padding:0 1.1rem;height:48px;background:none;border:none;border-bottom:2.5px solid transparent;font-family:'Poppins',sans-serif;font-size:0.68rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--gt);cursor:pointer;transition:all .2s;white-space:nowrap;margin-bottom:-1px;display:flex;align-items:center;gap:0.45rem}
.tb:hover{color:var(--rouge)}
.tb.active{color:var(--rouge);border-bottom-color:var(--rouge)}
.tbadge{background:var(--rose-mid);color:var(--rouge);font-size:0.52rem;font-weight:700;padding:0.12rem 0.42rem;border-radius:20px;min-width:18px;text-align:center}

/* MAIN */
main{flex:1;padding:2rem;max-width:1200px;width:100%;margin:0 auto}
.tc{display:none;animation:fi .15s ease}
.tc.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:1rem}
.ph-title{font-size:0.95rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--rouge)}
.ph-sub{font-size:0.66rem;color:var(--gt);margin-top:0.2rem}
.ph-actions{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}

/* SEARCH */
.sb{display:flex;align-items:center;gap:0.7rem;margin-bottom:1.5rem;flex-wrap:wrap}
.si-wrap{position:relative;flex:1;min-width:180px}
.si-wrap svg{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);opacity:0.35;pointer-events:none}
.si{width:100%;padding:0.6rem 0.75rem 0.6rem 2.1rem;border:1.5px solid var(--border);border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.78rem;background:var(--blanc);color:var(--noir);outline:none;transition:border-color .15s}
.si:focus{border-color:var(--rouge)}
.fs{padding:0.6rem 0.85rem;border:1.5px solid var(--border);border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.72rem;font-weight:500;background:var(--blanc);color:var(--gt);outline:none;cursor:pointer;transition:border-color .15s}
.fs:focus{border-color:var(--rouge)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-family:'Poppins',sans-serif;font-size:0.67rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;border:1.5px solid transparent}
.btn svg{width:13px;height:13px;flex-shrink:0}
.btn-p{background:var(--rouge);color:#fff;border-color:var(--rouge);box-shadow:0 2px 8px rgba(181,67,60,.25)}
.btn-p:hover{background:var(--rouge-dk);transform:translateY(-1px);box-shadow:0 4px 16px rgba(181,67,60,.35)}
.btn-o{background:#fff;color:var(--rouge);border-color:var(--rouge)}
.btn-o:hover{background:var(--rose)}
.btn-g{background:#fff;color:var(--gt);border-color:var(--border)}
.btn-g:hover{border-color:var(--rouge);color:var(--rouge);background:var(--rose)}
.btn-d{background:#fff;color:#c0392b;border-color:#e8c0c0}
.btn-d:hover{background:#fdf0f0;border-color:#c0392b}
.btn-sm{padding:0.32rem 0.7rem;font-size:0.6rem}
.btn:disabled{opacity:0.5;cursor:not-allowed;pointer-events:none;transform:none;box-shadow:none}

/* FICHE CARDS */
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem}
.fc{background:#fff;border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:all .25s;cursor:pointer;box-shadow:var(--sh-sm)}
.fc:hover{border-color:var(--rouge);box-shadow:var(--sh-md);transform:translateY(-4px)}
.fc-top{background:var(--rose);padding:1.25rem 1.4rem 1rem;border-bottom:2px solid var(--rouge)}
.fc-cat{font-size:0.55rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--rouge);margin-bottom:0.35rem;opacity:.8}
.fc-name{font-size:1rem;font-weight:700;color:var(--noir);line-height:1.25}
.fc-body{padding:0.9rem 1.4rem}
.fc-meta{font-size:0.67rem;color:var(--gt);display:flex;justify-content:space-between;margin-bottom:0.55rem}
.fc-prev{font-size:0.69rem;color:var(--gt);line-height:1.5}
.fc-foot{padding:0.65rem 1.4rem;border-top:1px solid var(--gc);display:flex;gap:0.4rem;justify-content:flex-end;flex-wrap:wrap}

/* PLAT CARDS */
.pc{background:#fff;border:1.5px solid var(--border);border-radius:16px;margin-bottom:0.85rem;overflow:hidden;box-shadow:var(--sh-sm);transition:all .2s}
.pc:hover{border-color:var(--rose-mid);box-shadow:var(--sh-md)}
.pc-head{background:#fff;padding:1.1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid transparent;transition:background .15s}
.pc-head:hover{background:var(--rose)}
.pc.expanded .pc-head{background:var(--rose);border-bottom-color:var(--rose-mid)}
.pc-sec{font-size:0.55rem;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--rouge);margin-bottom:0.15rem;opacity:.8}
.pc-name{font-size:0.92rem;font-weight:700;color:var(--noir)}
.pc-chev{font-size:0.72rem;color:var(--gt);transition:transform .25s}
.pc.expanded .pc-chev{transform:rotate(180deg)}
.pc-body{display:none;padding:1.25rem 1.5rem}
.pc.expanded .pc-body{display:block}
.comp-list{display:flex;flex-direction:column;gap:0.4rem}
.comp-item{display:flex;align-items:center;justify-content:space-between;padding:0.55rem 0.85rem;background:var(--rose);border:1px solid var(--rose-mid);border-radius:var(--r);font-size:0.75rem}
.comp-item.linked{cursor:pointer;transition:all .15s}
.comp-item.linked:hover{border-color:var(--rouge);background:var(--blanc)}
.comp-lnk{font-size:0.58rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--rouge)}

/* MENU */
.ms{margin-bottom:2.5rem}
.ms-label{font-size:0.58rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:var(--rouge);padding-bottom:0.5rem;margin-bottom:1rem;border-bottom:1px solid var(--rose-mid)}
.mr{display:flex;padding:0.85rem 0;border-bottom:1px solid var(--gc);gap:1rem;align-items:flex-start}
.mr-name{font-size:0.87rem;font-weight:600;color:var(--noir);margin-bottom:0.2rem}
.mr-desc{font-size:0.69rem;color:var(--gt);line-height:1.5}
.atags{display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.4rem}
.atag{font-size:0.55rem;font-weight:700;letter-spacing:0.06em;padding:0.15rem 0.42rem;border-radius:2px;background:var(--rose-mid);color:var(--rouge);text-transform:uppercase}
.mr-actions{display:flex;gap:0.3rem;flex-shrink:0;align-items:flex-start;margin-top:0.15rem}

/* CONFIG */
.cs{margin-bottom:2rem}
.cs-title{font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--rouge);padding-bottom:0.6rem;margin-bottom:1rem;border-bottom:1px solid var(--border)}
.cl{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:0.75rem}
.ci{display:flex;align-items:center;justify-content:space-between;padding:0.65rem 1rem;background:var(--blanc);border:1px solid var(--border);border-radius:var(--r)}
.ci-label{font-size:0.8rem;font-weight:500;color:var(--noir)}
.ca-row{display:flex;gap:0.5rem}
.ca-row input{flex:1;padding:0.6rem 0.85rem;border:1.5px solid var(--border);border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.78rem;background:var(--rose);color:var(--noir);outline:none;transition:border-color .15s}
.ca-row input:focus{border-color:var(--rouge);background:var(--blanc)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(20,10,10,.5);backdrop-filter:blur(4px);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.mo.open{display:flex}
.modal{background:#fff;border-radius:20px;width:100%;max-width:640px;margin:auto;box-shadow:0 24px 80px rgba(34,24,24,.2);animation:su .22s ease;overflow:hidden}
@keyframes su{from{transform:translateY(20px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.m-head{padding:1.5rem 2rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--rose)}
.m-title{font-size:0.78rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--rouge)}
.m-close{background:#fff;border:1.5px solid var(--border);font-size:1rem;cursor:pointer;color:var(--gt);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
.m-close:hover{border-color:var(--rouge);color:var(--rouge);background:var(--rose)}
.m-body{padding:1.75rem 2rem;max-height:72vh;overflow-y:auto}
.m-foot{padding:1rem 2rem 1.5rem;display:flex;justify-content:flex-end;gap:0.6rem;border-top:1px solid var(--border)}

/* FORM */
.fg2{margin-bottom:1.1rem}
.fl{display:block;font-size:0.62rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gt);margin-bottom:0.35rem}
.fi2,.fsel,.fta{width:100%;padding:0.65rem 0.85rem;border:1.5px solid var(--border);border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.8rem;background:var(--rose);color:var(--noir);outline:none;transition:border-color .15s}
.fi2:focus,.fsel:focus,.fta:focus{border-color:var(--rouge);background:var(--blanc)}
.fta{resize:vertical;min-height:80px;line-height:1.6}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.fsect{font-size:0.62rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--rouge);padding:0.75rem 0 0.5rem;border-top:1px solid var(--border);margin-top:0.25rem;margin-bottom:0.6rem}

/* DYNAMIC ROWS */
.il{display:flex;flex-direction:column;gap:0.4rem}
.ir{display:grid;grid-template-columns:1fr 70px 100px 28px;gap:0.35rem;align-items:center}
.btn-rm{width:28px;height:28px;background:none;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;color:var(--gt);font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-rm:hover{border-color:var(--rouge);color:var(--rouge);background:var(--rose)}
.btn-ar{display:flex;align-items:center;gap:0.4rem;padding:0.42rem 0.65rem;background:none;border:1.5px dashed var(--border);border-radius:var(--r);font-family:'Poppins',sans-serif;font-size:0.63rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gt);cursor:pointer;width:100%;margin-top:0.25rem;transition:all .15s}
.btn-ar:hover{border-color:var(--rouge);color:var(--rouge);border-style:solid}
.sl{display:flex;flex-direction:column;gap:0.4rem}
.sr{display:grid;grid-template-columns:24px 1fr 28px;gap:0.35rem;align-items:flex-start}
.sn{width:24px;height:24px;background:var(--rouge);color:var(--blanc);border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:0.62rem;font-weight:700;margin-top:0.45rem;flex-shrink:0}

/* FICHE DETAIL */
.fd{display:none;position:fixed;inset:0;background:var(--creme);z-index:150;overflow-y:auto}
.fd.open{display:block}
.fd-nav{background:var(--blanc);border-bottom:1px solid var(--border);padding:0.9rem 2rem;display:flex;align-items:center;gap:1rem;position:sticky;top:0;z-index:10;box-shadow:var(--sh-sm);flex-wrap:wrap}
.btn-back{background:none;border:none;font-family:'Poppins',sans-serif;font-size:0.66rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--gt);cursor:pointer;display:flex;align-items:center;gap:0.35rem;padding:0}
.btn-back:hover{color:var(--rouge)}
.fd-content{max-width:780px;margin:0 auto;padding:2rem}

/* FICHE DOC */
.fdoc{background:#fff;font-family:'Poppins',sans-serif;min-height:29.7cm;position:relative;box-sizing:border-box;border:1px solid var(--border)}
.fdoc-hdr{padding:1.25cm 2cm 0.75cm}
.fdoc-body{padding:0 2cm 3cm}
.fdoc-nom{font-size:2rem;font-weight:700;color:#221818;line-height:1.1;margin-bottom:0.2rem}
.fdoc-sub{font-size:0.7rem;color:#B5433C;font-weight:400}
.fdoc-sep{height:3px;margin:0.75rem 0 3px;background:#B5433C;border:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.fdoc-sep2{height:1px;background:#C0504A;opacity:0.3;border:none;margin-bottom:1.5rem}
.fdoc-meta{display:none}
.fdoc-cols{display:grid;grid-template-columns:1fr 1fr;gap:2rem;align-items:start}
.fdoc-ptitle{font-size:0.62rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#B5433C;margin-bottom:0.5rem;padding-bottom:0.3rem;border-bottom:1px solid #EDD8D8}
.fdoc-table{width:100%;border-collapse:collapse;border:1px solid #E0D0D0}
.fdoc-table thead th{font-size:0.62rem;font-weight:600;color:#B5433C;padding:0.6rem 0.75rem;text-align:left;background:#fff;border-bottom:1px solid #E0D0D0}
.fdoc-table thead th:last-child{text-align:right}
.fdoc-table tbody td{padding:0.55rem 0.75rem;font-size:0.78rem;color:#221818;border-bottom:1px solid #EDD8D8}
.fdoc-table tbody tr:last-child td{border-bottom:none}
.fdoc-table tbody tr:nth-child(odd) td{background:#fff}
.fdoc-table tbody tr:nth-child(even) td{background:#F5ECEC;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.fdoc-table tbody td:last-child{text-align:right;color:#6B5C5C;font-weight:500;white-space:nowrap}
.fdoc-steps{display:flex;flex-direction:column;border:1px solid #E0D0D0}
.fdoc-step{display:flex;align-items:stretch;border-bottom:1px solid #E0D0D0}
.fdoc-step:last-child{border-bottom:none}
.fdoc-step:nth-child(odd) .fdoc-stxt{background:#F5ECEC;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.fdoc-step:nth-child(even) .fdoc-stxt{background:#fff}
.fdoc-snum{width:32px;flex-shrink:0;background:#B5433C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.fdoc-stxt{flex:1;padding:0.55rem 0.75rem;font-size:0.78rem;color:#221818;line-height:1.45}
.fdoc-footer{position:absolute;bottom:1.25cm;left:2cm;right:2cm;display:flex;justify-content:space-between;padding-top:0.6rem;border-top:1px solid #E0D0D0}
.fdoc-fl{font-size:0.58rem;font-weight:400;color:#B5433C;margin-bottom:0.2rem}
.fdoc-fv{font-size:1.1rem;font-weight:700;color:#221818}



/* EMPTY */
.es{text-align:center;padding:4rem 2rem;color:var(--gt)}
.es-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.22}
.es h3{font-size:0.82rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.5rem;color:var(--noir)}
.es p{font-size:0.76rem;line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:1.75rem;right:1.75rem;background:var(--noir);color:#fff;padding:0.8rem 1.4rem;border-radius:12px;font-size:0.72rem;font-weight:600;z-index:500;opacity:0;transform:translateY(12px) scale(.96);transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.toast.show{opacity:1;transform:translateY(0) scale(1)}
.toast.ok{background:#1e5c1e}
.toast.err{background:var(--rouge-dk)}

/* PRINT */
#print-area{display:none}
@media print{
  @page{size:A4;margin:0}
  html,body{background:white!important}
  body > *{display:none!important}
  #print-area{display:block!important;background:white!important;width:100%;height:100%}
  #print-area *{visibility:visible!important}
  .fdoc-step:nth-child(even) .fdoc-stxt{background:#F5ECEC!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fdoc-step:nth-child(odd) .fdoc-stxt{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fdoc-table tbody tr:nth-child(even) td{background:#F5ECEC!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fdoc-table tbody tr:nth-child(odd) td{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fdoc-snum{background:#B5433C!important;color:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .fdoc-sep{background:#B5433C!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

/* ANIMATIONS */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.spinner{width:28px;height:28px;border:2.5px solid var(--rose-mid);border-top-color:var(--rouge);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}

const sb=supabase.createClient(SB_URL,SB_KEY);

let profil=null, editId=null, editPlatId=null, curFicheId=null;
let fiches=[], plats=[];

const MENU_INITIAL={
  'Entrées':[

let cfg={

// ── UTILS ──
function escHTML(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function menuDateLabel(){
  const d=new Date();
  const m=d.toLocaleString('fr-FR',{month:'long'});
  return 'Lunch · '+m.charAt(0).toUpperCase()+m.slice(1)+' '+d.getFullYear();
}

function setBusy(btnId,v){
  const b=document.getElementById(btnId);
  if(!b)return;
  b.disabled=v;
  b.style.opacity=v?'0.6':'';
}

function setSyncing(v){
  document.getElementById('sync-dot').classList.toggle('syncing',v);
  document.getElementById('sync-lbl').textContent=v?'Sync…':'Sync';
}

const ADMIN_PW='lava2026';

// ── LOGIN ──
function showPW(){
  document.getElementById('pw-field').style.display='flex';
  setTimeout(()=>document.getElementById('pw-input').focus(),50);
}

async function checkPW(){
  const pw=document.getElementById('pw-input').value;
  if(!pw)return;
  setBusy('btn-confirm',true);
  setBusy('btn-admin',true);
  document.getElementById('l-err').style.display='none';
  if(pw===ADMIN_PW){
    loginAs('admin');
  }else{
    document.getElementById('l-err').style.display='block';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
  setBusy('btn-confirm',false);
  setBusy('btn-admin',false);
}

function loginAs(p){
  profil=p;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('prof-badge').textContent=p==='admin'?'Admin':'Cuisine';
  if(p==='admin')document.querySelectorAll('.admin-only').forEach(el=>el.style.display='flex');
  document.getElementById('menu-sub').textContent=menuDateLabel();
  loadCfg().then(()=>loadAll());
}

function logout(){
  profil=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pw-field').style.display='none';
  document.getElementById('pw-input').value='';
  document.getElementById('l-err').style.display='none';
}

// ── CONFIG (Supabase direct + localStorage fallback) ──
async function loadCfg(){
  try{
    const{data}=await sb.from('lava_config').select('*').eq('id','main').single();
    if(data&&data.data){
      cfg={...cfg,...data.data};
      if(!cfg.menu)cfg.menu=JSON.parse(JSON.stringify(MENU_INITIAL));
      populateSels();renderCfg();
      return;
    }
  }catch(e){}
  try{const s=localStorage.getItem('lava_cfg');if(s){const d=JSON.parse(s);cfg={...cfg,...d};}}catch(e){}
  if(!cfg.menu)cfg.menu=JSON.parse(JSON.stringify(MENU_INITIAL));
  populateSels();renderCfg();
}

async function saveCfg(){
  try{localStorage.setItem('lava_cfg',JSON.stringify(cfg));}catch(e){}
  try{await sb.from('lava_config').upsert({id:'main',data:cfg});}catch(e){}
  populateSels();renderCfg();
}

function populateSels(){

// ── RENDER FICHES ──
function renderFiches(){
  const q=(document.getElementById('s-rec')?.value||'').toLowerCase();
  const cat=document.getElementById('f-cat-filter')?.value||'';
  const grid=document.getElementById('fiches-grid');
  let fil=fiches.filter(f=>{
    const mq=!q||f.nom.toLowerCase().includes(q)||(f.ingredients||[]).some(i=>i.nom?.toLowerCase().includes(q));
    return mq&&(!cat||f.categorie===cat);
  });
  const tot=fiches.length;
  document.getElementById('rec-sub').textContent=tot===0?'Aucune fiche':tot+' fiche'+(tot!==1?'s':'')+(fil.length!==tot?` · ${fil.length} résultat${fil.length!==1?'s':''}`:'');
  document.getElementById('b-rec').textContent=tot;
  grid.innerHTML='';
  if(tot===0){grid.innerHTML='<div class="es" style="grid-column:1/-1"><div class="es-icon">📋</div><h3>Aucune fiche</h3><p>Crée ta première fiche ou importe depuis une photo</p></div>';return}
  if(fil.length===0){grid.innerHTML='<div class="es" style="grid-column:1/-1"><div class="es-icon">🔍</div><h3>Aucun résultat</h3><p>Essaie un autre terme</p></div>';return}
  fil.forEach(f=>{
    const c=document.createElement('div');c.className='fc';
    const ingCount=(f.ingredients||[]).length;
    c.innerHTML=`<div class="fc-top"><div class="fc-cat">${escHTML(f.categorie||'—')}</div><div class="fc-name">${escHTML(f.nom)}</div></div><div class="fc-foot">${profil==='admin'?`<button class="btn btn-d btn-sm" onclick="event.stopPropagation();deleteFiche('${escHTML(f.id)}')">✕</button><button class="btn btn-g btn-sm" onclick="event.stopPropagation();editFiche('${escHTML(f.id)}')">Modifier</button><button class="btn btn-g btn-sm" onclick="event.stopPropagation();duplicateFiche('${escHTML(f.id)}')">Copier</button>`:''}<button class="btn btn-p btn-sm" onclick="openFD('${escHTML(f.id)}')">Voir →</button></div>`;
    grid.appendChild(c);
  });
}

// ── RENDER PLATS ──
function renderPlats(){
  const q=(document.getElementById('s-plats')?.value||'').toLowerCase();
  const sec=document.getElementById('f-sec-filter')?.value||'';
  const list=document.getElementById('plats-list');
  const tot=plats.length;
  let fil=plats.filter(p=>(!q||p.nom.toLowerCase().includes(q))&&(!sec||p.section===sec));
  document.getElementById('plats-sub').textContent=tot+' plat'+(tot!==1?'s':'');
  document.getElementById('b-plats').textContent=tot;
  if(tot===0){list.innerHTML='<div class="es"><div class="es-icon">🍽️</div><h3>Aucun plat</h3><p>Ajoute les plats de ta carte</p></div>';return}
  if(fil.length===0){list.innerHTML='<div class="es"><div class="es-icon">🔍</div><h3>Aucun résultat</h3></div>';return}
  list.innerHTML='';
  fil.forEach(p=>{
    const d=document.createElement('div');d.className='pc';
    const ch=(p.composants||[]).map(c=>{
      const f=fiches.find(f=>f.nom.toLowerCase()===c.toLowerCase());
      return f
        ?`<div class="comp-item linked" onclick="openFD('${escHTML(f.id)}')"><span>${escHTML(c)}</span><span class="comp-lnk">→ Fiche</span></div>`
        :`<div class="comp-item"><span>${escHTML(c)}</span></div>`;
    }).join('');
    const ah=(p.allergenes||'').split(',').filter(Boolean).map(a=>`<span class="atag">${escHTML(a.trim())}</span>`).join('');
    const adminBtns=profil==='admin'
      ?`<div style="margin-top:1rem;display:flex;justify-content:flex-end;gap:0.4rem">
          <button class="btn btn-g btn-sm" onclick="editPlat('${escHTML(p.id)}')">Modifier</button>
          <button class="btn btn-d btn-sm" onclick="deletePlat('${escHTML(p.id)}')">Supprimer</button>
        </div>`:'';
    d.innerHTML=`<div class="pc-head" onclick="this.parentElement.classList.toggle('expanded')"><div><div class="pc-sec">${escHTML(p.section)}</div><div class="pc-name">${escHTML(p.nom)}</div></div><span class="pc-chev">▼</span></div><div class="pc-body">${p.description?`<p style="font-size:0.74rem;color:var(--gt);margin-bottom:1rem">${escHTML(p.description)}</p>`:''}<div class="comp-list">${ch}</div>${ah?`<div class="atags" style="margin-top:1rem">${ah}</div>`:''} ${p.dressage?`<div style="margin-top:1rem;padding:0.75rem;background:var(--rose);font-size:0.7rem;color:var(--gt);line-height:1.6;border-left:2px solid var(--rouge);border-radius:var(--r)">${escHTML(p.dressage)}</div>`:''} ${adminBtns}</div>`;
    list.appendChild(d);
  });
}

// ── RENDER MENU ──
function renderMenu(){
  const cont=document.getElementById('menu-content');cont.innerHTML='';
  const menu=cfg.menu||MENU_INITIAL;
  cfg.secs.forEach(sec=>{
    const items=menu[sec]||[];if(!items.length)return;
    const d=document.createElement('div');d.className='ms';
    d.innerHTML=`<div class="ms-label">${escHTML(sec)}</div>`;
    items.forEach((item,idx)=>{

      const adminBtn=profil==='admin'
        ?`<div class="mr-actions"><button class="btn btn-d btn-sm" onclick="deleteMenuItem('${escHTML(sec)}',${idx})">✕</button></div>`:'';
      r.innerHTML=`<div style="flex:1"><div class="mr-name">${escHTML(item.nom)}</div><div class="mr-desc">${escHTML(item.comp.join(' · '))}</div>${ah?`<div class="atags">${ah}</div>`:''}</div>${adminBtn}`;

const COND_TYPES=['Sac sous vide','Siphon','Petite boite','Moyenne boite','Grande boite','Poche à pâtisserie','Pipette'];
function addCondRow(type='',qty=''){
  const l=document.getElementById('cond-il');
  const r=document.createElement('div');
  r.className='cond-row';
  r.style.cssText='display:grid;grid-template-columns:1fr 110px 28px;gap:0.35rem;align-items:center';

function addIR(nom='',qty='',u='g'){
  const l=document.getElementById('il');const r=document.createElement('div');r.className='ir';
  const units=['g','kg','cl','L','cs','cc','pièce','botte','ml'];
  const opts=units.map(x=>`<option value="${x}" ${u===x?'selected':''}>${x}</option>`).join('');
  r.innerHTML=`<input class="fi2 ing-n" type="text" placeholder="Ingrédient" value="${escHTML(nom.toUpperCase())}" oninput="this.value=this.value.toUpperCase()"><input class="fi2 ing-q" type="number" step="any" placeholder="Qté" value="${escHTML(qty)}" min="0"><select class="fsel ing-u">${opts}</select><button class="btn-rm" onclick="this.parentElement.remove()">×</button>`;
  l.appendChild(r);if(!nom)r.querySelector('.ing-n').focus();
}

function addSR(t=''){
  const l=document.getElementById('sl');const n=l.children.length+1;const r=document.createElement('div');r.className='sr';
  r.innerHTML=`<div class="sn">${n}</div><input class="fi2 s-txt" type="text" placeholder="Étape ${n}" value="${escHTML(t)}"><button class="btn-rm" onclick="this.parentElement.remove();renum()">×</button>`;
  l.appendChild(r);if(!t)r.querySelector('.s-txt').focus();
}

async function saveFiche(){
  const nom=document.getElementById('f-nom').value.trim();
  if(!nom){toast('Le nom est obligatoire','err');return}
  setBusy('btn-save-fiche',true);
  try{
    const ings=[];
    document.querySelectorAll('#il .ir').forEach(r=>{const n=r.querySelector('.ing-n').value.trim().toUpperCase();if(n)ings.push({nom:n,quantite:r.querySelector('.ing-q').value.trim(),unite:r.querySelector('.ing-u').value})});
    const proc=[];
    document.querySelectorAll('#sl .s-txt').forEach(i=>{if(i.value.trim())proc.push(i.value.trim())});
    const conds=[];
    document.querySelectorAll('#cond-il .cond-row').forEach(r=>{
      const t=r.querySelector('.cond-type').value;
      const q=r.querySelector('.cond-qty').value.trim();
      if(t)conds.push(t+(q?' — '+q:''));
    });
    const conditionnement=JSON.stringify(conds);
    const data={nom,categorie:document.getElementById('f-cat').value,quantite_nette:document.getElementById('f-qte').value.trim(),conditionnement,ingredients:ings,process:proc};
    setSyncing(true);
    const res=editId?await sb.from('fiches').update(data).eq('id',editId):await sb.from('fiches').insert(data);
    setSyncing(false);
    if(res.error){toast('Erreur : '+res.error.message,'err');return}
    toast(editId?'Fiche modifiée ✓':'Fiche enregistrée ✓','ok');
    closeModal('modal-fiche');await loadAll();
  }catch(e){
    setSyncing(false);
    toast('Erreur réseau — réessaie','err');
  }finally{
    setBusy('btn-save-fiche',false);
  }
}

async function editFiche(id){
  const f=fiches.find(f=>f.id===id);if(!f)return;
  editId=id;
  document.getElementById('mf-title').textContent='Modifier — '+f.nom;
  document.getElementById('f-nom').value=f.nom;
  document.getElementById('f-qte').value=f.quantite_nette||'';
  document.getElementById('cond-il').innerHTML='';
  let conds=[];
  try{conds=JSON.parse(f.conditionnement||'[]');}catch(e){if(f.conditionnement)conds=[f.conditionnement];}
  if(conds.length){
    const CT=['Sac sous vide','Siphon','Petite boite','Moyenne boite','Grande boite','Poche à pâtisserie','Pipette'];
    conds.forEach(c=>{const m=CT.find(t=>c.startsWith(t));addCondRow(m||'',m?c.replace(m,'').replace(/^\s*—\s*/,'').trim():c);});
  }else{addCondRow();}
  await new Promise(r=>setTimeout(r,0));
  document.getElementById('f-cat').value=f.categorie;
  document.getElementById('il').innerHTML='';
  (f.ingredients||[]).forEach(i=>addIR(i.nom,i.quantite,i.unite));
  document.getElementById('sl').innerHTML='';
  (f.process||[]).forEach(s=>addSR(s));
  openModal('modal-fiche');
}

  const condDisplay=(()=>{try{const a=JSON.parse(f.conditionnement||'[]');return a.length?a.map(escHTML).join('<br>'):'—';}catch(e){return escHTML(f.conditionnement||'—');}})();
  return `<div class="fdoc">

    .fdoc-table tbody tr:nth-child(odd) td{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .fdoc-table tbody tr:nth-child(even) td{background:#F5ECEC;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .fdoc-table tbody td:last-child{text-align:right;color:#221818;font-weight:600;white-space:nowrap}
    .fdoc-ptitle{font-size:7.5pt;font-weight:700;color:#B5433C;margin-bottom:6pt}
    .fdoc-steps{border:1px solid #E0D0D0}
    .fdoc-step{display:flex;align-items:stretch;border-bottom:1px solid #E0D0D0;page-break-inside:avoid}
    .fdoc-step:last-child{border-bottom:none}
    .fdoc-step:nth-child(odd) .fdoc-stxt{background:#F5ECEC;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .fdoc-step:nth-child(even) .fdoc-stxt{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .fdoc-snum{width:26pt;flex-shrink:0;background:#B5433C;color:#fff;display:flex;align-items:center;justify-content:center;font-size:7.5pt;font-weight:700;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .fdoc-stxt{flex:1;padding:6pt 9pt;font-size:9pt;color:#221818;line-height:1.4}
    .fdoc-footer{margin-top:24pt;display:flex;justify-content:space-between;padding-top:8pt;border-top:1px solid #E0D0D0}
    .fdoc-fl{font-size:7pt;font-weight:400;color:#B5433C;margin-bottom:3pt}
    .fdoc-fv{font-size:13pt;font-weight:700;color:#221818}
  </style></head><body>
  ${buildFicheDoc(f)}
  <script>window.onload=function(){window.print();setTimeout(()=>window.close(),500)}<\/script>
  </body></html>`;
  const w=window.open('','_blank','width=900,height=1200');
  w.document.write(html);
  w.document.close();
}

function printMenu(){
  const menu=cfg.menu||MENU_INITIAL;
  let html=`<div style="font-family:'Poppins',sans-serif;max-width:560px;margin:0 auto;padding:0">
    <div style="margin-bottom:1.25rem">
      <div style="font-size:1.5rem;font-weight:700;letter-spacing:0.3em;color:#B5433C">LAVA</div>
      <div style="font-size:0.6rem;letter-spacing:0.2em;color:#6B5C5C;text-transform:uppercase">${menuDateLabel()}</div>
    </div>
    <div style="height:3px;background:#B5433C;margin-bottom:0.25rem"></div>
    <div style="height:1px;background:#C0504A;opacity:0.35;margin-bottom:2rem"></div>`;
  cfg.secs.forEach(sec=>{
    const items=menu[sec]||[];if(!items.length)return;
    html+=`<div style="margin-bottom:1.75rem"><div style="font-size:0.58rem;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:#B5433C;border-bottom:1px solid #EDD8D8;padding-bottom:0.4rem;margin-bottom:1rem">${escHTML(sec)}</div>`;
    items.forEach(i=>{html+=`<div style="margin-bottom:1.1rem"><div style="font-size:0.87rem;font-weight:600;margin-bottom:0.2rem">${escHTML(i.nom)}</div><div style="font-size:0.69rem;color:#6B5C5C;line-height:1.5">${escHTML(i.comp.join(' · '))}</div></div>`});
    html+='</div>';
  });
  html+='</div>';
  const pa=document.getElementById('print-area');
  pa.style.display='block';pa.innerHTML=html;
  window.print();
  setTimeout(()=>{pa.style.display='none';pa.innerHTML=''},800);
}


// ── TOAST ──
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?' '+type:'');
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
